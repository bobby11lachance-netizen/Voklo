<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#080808"/>
  
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Blue glow circle -->
  <ellipse cx="600" cy="200" rx="500" ry="300" fill="rgba(37,99,235,0.12)"/>

  <!-- Voklo logo text -->
  <text x="600" y="345" 
    font-family="'Cabinet Grotesk', 'Arial Black', sans-serif" 
    font-weight="900" 
    font-size="160" 
    letter-spacing="-6" 
    text-anchor="middle" 
    fill="#FFFFFF">Vok<tspan fill="#60A5FA">lo</tspan></text>

  <!-- Tagline -->
  <text x="600" y="420"
    font-family="'Satoshi', 'Arial', sans-serif"
    font-weight="500"
    font-size="28"
    text-anchor="middle"
    fill="rgba(255,255,255,0.4)"
    letter-spacing="1">Social Media on Autopilot</text>

  <!-- Bottom accent line -->
  <rect x="540" y="460" width="120" height="3" rx="2" fill="#2563EB"/>
</svg>
